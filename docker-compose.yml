# TouchBaseAI — full-stack deployment for a single VPS (Hetzner, etc.)
# Caddy terminates HTTPS and serves the frontend, proxying /api/* to the backend.
# Frontend + API share one origin, so there are no CORS problems.

services:
  backend:
    build: ./Follow-Up-Backend-main
    env_file: .env
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Follow-up-frontend-main
      args:
        # Relative base URL -> same origin -> Caddy proxies /api/* to backend
        VITE_BASE_URL: /api/v1
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
