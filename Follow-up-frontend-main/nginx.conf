server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback so client-side routes (e.g. /dashboard) work on refresh.
    # index.html must never be cached: it names the hashed asset files, so a
    # stale copy keeps loading the previous deploy's bundle (or 404s once that
    # bundle is gone). Without this, users only see a deploy after a hard reload.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
