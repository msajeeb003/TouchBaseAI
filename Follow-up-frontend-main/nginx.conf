server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback so client-side routes (e.g. /dashboard) work on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
